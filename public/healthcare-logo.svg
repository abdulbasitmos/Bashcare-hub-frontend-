<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#E8F4F8" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Calendar base -->
  <rect x="30" y="25" width="40" height="35" rx="3" fill="#1E40AF" stroke="#1E40AF" stroke-width="1.5"/>
  
  <!-- Calendar days section -->
  <rect x="30" y="35" width="40" height="25" fill="#FFFFFF"/>
  
  <!-- Calendar grid lines -->
  <line x1="30" y1="40" x2="70" y2="40" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="45" x2="70" y2="45" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="50" x2="70" y2="50" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Calendar date numbers -->
  <text x="35" y="44" font-size="6" fill="#666" font-weight="bold">12</text>
  <text x="50" y="44" font-size="6" fill="#666" font-weight="bold">13</text>
  <text x="65" y="44" font-size="6" fill="#666" font-weight="bold">14</text>
  
  <!-- Medical cross (plus sign) overlay -->
  <g transform="translate(50, 65)">
    <!-- Vertical line of cross -->
    <rect x="-2" y="-8" width="4" height="16" fill="#DC2626" rx="1"/>
    <!-- Horizontal line of cross -->
    <rect x="-8" y="-2" width="16" height="4" fill="#DC2626" rx="1"/>
  </g>
  
  <!-- Stethoscope curve at bottom -->
  <g stroke="#10B981" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 35 72 Q 40 78 45 75" />
    <path d="M 65 72 Q 60 78 55 75" />
    <circle cx="50" cy="77" r="2.5" fill="#10B981"/>
  </g>
</svg>